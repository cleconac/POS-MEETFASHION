<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"><title>Estaciones - POS</title>
<link rel="stylesheet" href="styles.css">
<style>
.container-small{ max-width:100%; margin:28px auto; padding:18px; background:#fff; border-radius:10px; box-shadow:0 4px 18px rgba(0,0,0,0.06); }
.form-row{ display:flex; gap:10px; flex-wrap:wrap; }
.form-row input, .form-row select{ padding:10px; border-radius:6px; border:1px solid #ddd; flex:1; }
.user-list{ margin-top:20px; }
.user-row{ display:flex; justify-content:space-between; padding:10px 12px; border-bottom:1px solid #f0f0f0; align-items:center; }
.small-btn{ padding:6px 8px; font-size:13px; }
</style>
</head>
<body>

<header class="topbar">
    <div class="title">Gestión de Estaciones de trabajo</div>
    <div  class="topbar-left">
       <button class="btn-sec" onclick="location.href='ventas.html'">← Volver al POS</button>
       <button  class="btn small" onclick="abrirModalNuevaEstacion()">Agregar  estación</button>
   </div>
</header>
<div class="container container-small">




<div class="user-header">
    <h2>Estaciones</h2>
</div>

<table  class="user-table">
   <thead>
       <tr>
	   <th>Nombre</th>
	   <th>Modificado</th>
	   <th>Acciones</th>
       </tr>
   </thead>
   <tbody  id="stations-table-body"></tbody>
</table>
</div>

<!-- Modal de estación -->
<div  id="modal-station"  class="modal  hidden">
   <div  class="modal-content">
      <h3  id="modal-title-station">Nueva  estación</h3>
       <div class="form-row">
           <input id="u-station"  placeholder="Nombre de la estación">
       </div>
       <div  class="form-row">
          <button  class="btn"  onclick="saveStation()">Guardar</button>
          <button  class="btn alt"  onclick="cerrarModal()">Cancelar</button>
       </div>
   </div>
</div>

<script src="db.js"></script>
<script  src="auth.js"></script>
<script>

 window.addEventListener('DOMContentLoaded',  ()  => {
     renderStations();
});

let editId = null; 

function saveStation(){
    const nameIn = document.getElementById('u-station').value.trim();
    if (!nameIn) return alert('Estación requerida');

    let listaActual = DB.getStations();

    // 2. LOGICA DE ACTUALIZACIÓN VS CREACIÓN
    if (editId !== null) {

	// MODO EDITAR: Validar que el nuevo nombre no lo tenga OTRA estación diferente a la que edito
        const existeDuplicado = listaActual.some(e => e.nombre.toLowerCase() === nameIn.toLowerCase() && e.id !== editId);
        if (existeDuplicado) {
            return alert('Este nombre de estación ya está en uso.');
        }

        // MODO EDITAR: Reemplaza el elemento que coincide con el nombre viejo (editId)
        listaActual = listaActual.map(e => {
            if (e.id === editId || e.nombre === editId) { 
                return {
                    ...e,
                    nombre: nameIn, // Aplica el nuevo nombre editado
                    modified: new Date().toISOString() // Actualiza la fecha
                };
            }
            return e;
        });
        
        editId = null; // Limpia la variable para la siguiente operación
        
    } else {
        // MODO CREAR: Valida que no exista duplicado antes de añadir
        if (listaActual.some(e => e.nombre.toLowerCase() === nameIn.toLowerCase())) {
            return alert('Esta estación ya existe.');
        }

        const nuevaEstacion = {
            id: Date.now().toString(),
            modified: new Date().toISOString(),
            nombre: nameIn,
            activa: true
        };
        listaActual.push(nuevaEstacion);
    }

    // 3. GUARDAR Y REFRESCAR LA PANTALLA
    DB.saveStations(listaActual);

    document.getElementById('u-station').value = '';
    cerrarModal();
    renderStations();
}

// 5. ELIMINACIÓN LIMPIA POR ID ÚNICO
function deleteStation(id){
  const listaActual = DB.getStations();
  if (listaActual.length <= 1) {
      return alert('Debe quedar al menos una estación activa en el sistema.');
  }

  // Buscamos el objeto para mostrar su nombre real en la alerta
  const estacionABorrar = listaActual.find(x => x.id === id);
  const nombreMostrar = estacionABorrar ? estacionABorrar.nombre : "esta estación";

  if(!confirm(`¿Eliminar la estación "${nombreMostrar}"?`)) return;
  
  // Filtramos removiendo exclusivamente el ID seleccionado
  const nuevaLista = listaActual.filter(x => x.id !== id);
  
  DB.saveStations(nuevaLista);
  renderStations();
}

function abrirModalNuevaEstacion(){
  editId = null;
  document.getElementById('modal-title-station').textContent = 'Nueva estación';
  document.querySelectorAll('#u-station').forEach(i => i.value = '');
  document.getElementById('u-station').readOnly = false;
  document.getElementById('modal-station').classList.remove('hidden');
}

function abrirModalEditarEstacion(id){
  // 1. Buscamos la estación usando su ID único
  const obj = DB.getStations().find(x => x.id === id || x.nombre === id);
  if (!obj) return;
  
  // 2. Guardamos el ID único (o el nombre si es la estación 'Principal' vieja de respaldo)
  editId = obj.id || obj.nombre; 
  
  document.getElementById('modal-title-station').textContent = 'Editar estación';
  document.getElementById('u-station').value = obj.nombre;
  document.getElementById('u-station').readOnly = false;
  document.getElementById('modal-station').classList.remove('hidden');
}


function editStation(u){
  const obj = DB.getStations().find(x=>x.nombre===u);
  if(!obj) return;
  document.getElementById('u-station').value = obj.nombre;
}

// 1. Capturar de forma segura la sesión del administrador activo
const activeStationUserSession = JSON.parse(sessionStorage.getItem('pos_user')) || null;

// 2. FUNCIÓN PARA CONTROLAR LA CABECERA (BOTÓN AGREGAR ESTACIÓN)
function validarCabeceraEstaciones() {
    if (!activeStationUserSession) return;

    const aliasLogueado = (activeStationUserSession.user || activeStationUserSession.usuario || '').toLowerCase();
    const rolLogueado = (activeStationUserSession?.role || activeStationUserSession?.rol || '').toLowerCase();
    const esMaestro = aliasLogueado === 'sup' || aliasLogueado === 'admin' || rolLogueado === 'master';
    
    // Leemos la casilla específica del árbol: estaciones -> crear
    const puedeCrear = esMaestro || (activeStationUserSession.permisos?.estaciones?.crear || false);

    // Localizamos tu botón superior para añadir cajas físicas
    const btnAgregarEstacion = document.getElementById('btn-add-station-top') || document.querySelector('button[onclick*="abrirModalNuevaEstacion"]');
    
    if (btnAgregarEstacion) {
        // Si no tiene el permiso marcado, el botón desaparece de la cabecera
        btnAgregarEstacion.style.display = puedeCrear ? '' : 'none';
    }
}

// 3. ACTUALIZAR EL RENDERIZADOR DE LA TABLA DE ESTACIONES
function renderStations() {
    const tbody = document.getElementById('stations-table-body'); // Usa tu ID de tabla real
    if (!tbody) return;
    
    const listaEstaciones = DB.getStations ? DB.getStations() : [];
    tbody.innerHTML = '';

    const aliasLogueado = (activeStationUserSession?.user || activeStationUserSession?.usuario || '').toLowerCase();
    const rolLogueado = (activeStationUserSession?.role || activeStationUserSession?.rol || '').toLowerCase();
    const esMaestro = rolLogueado === 'master';
    
    // Recuperamos las llaves del subobjeto de estaciones del árbol
    const p = esMaestro ? { editar: true, eliminar: true } : (activeStationUserSession?.permisos?.estaciones || {});

    listaEstaciones.forEach(est => {
        const tr = document.createElement('tr');
        
        let botonEditarHtml = '';
        let botonEliminarHtml = '';

        // Evaluar permiso para Editar Caja
        if (esMaestro || p.editar) {
            botonEditarHtml = `<button class="btn small" style="background-color: #0066ff;" onclick="abrirModalEditarEstacion('${est.nombre}')">✏️ Editar</button>`;
        }

        // Evaluar permiso para Eliminar Caja
        if (esMaestro || p.eliminar) {
            // Candado preventivo: No dejar eliminar la estación "Principal" o "Salto del Agua" base para evitar errores en cascada
            if (est.nombre.toLowerCase() === 'principal' || est.nombre.toLowerCase() === 'salto del agua') {
                botonEliminarHtml = `<button class="btn small" disabled style="background:#cbd5e1; color:#94a3b8; cursor:not-allowed;" title="Estación base del sistema imborrable.">🗑️ Eliminar</button>`;
            } else {
                botonEliminarHtml = `<button class="btn small" style="background-color: #dc3545;" onclick="deleteStation('${est.id || est.nombre}')">🗑️ Eliminar</button>`;
            }
        }

        tr.innerHTML = `
            <td><strong>${est.nombre}</strong></td>
            <td>${est.modified ? new Date(est.modified).toLocaleString() : '—'}</td>
            <td>
                ${botonEditarHtml}
                ${botonEliminarHtml}
            </td>
        `;
        tbody.appendChild(tr);
    });
}

// Disparar las validaciones en cuanto abre la pantalla de estaciones
document.addEventListener("DOMContentLoaded", () => {
    validarCabeceraEstaciones();
    if (typeof renderStations === "function") renderStations();
});



function cerrarModal(){
  document.getElementById('modal-station').classList.add('hidden');
}

document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
        const modal = document.getElementById("modal-station");
        if (modal && !modal.classList.contains("hidden")) {
            // Cerrar modal
            modal.classList.add("hidden");
	}
    }
});

renderStations();

</script>
</body>
</html>
