<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo de Artículos</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="catalog.css">
</head>
<body>
<header class="topbar">
    <div class="title">Catálogo de Artículos</div>
   <div  class="topbar-right">
       <div>
           <button class="btn-sec" onclick="window.location='ventas.html'">← Volver al POS</button>
	   <input id="file-csv" type="file" accept=".csv" />
           <button class="btn small" onclick="abrirNuevo()">+ Nuevo Artículo</button>
   	   <button id="btn-import-csv" class="btn small">Importar CSV</button>
	   <button id="btn-export-csv" class="btn small">Exportar CSV</button>
       </div>
    </div>

</header>


<div class="container">
 <input  id="search-cat"  type="text"  placeholder="Buscar artículo..."  />

    <table class="cat-table">
        <thead>
            <tr>
                <th>Código</th>
                <th>Artículo</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="catBody"></tbody>
    </table>
<div id="pagination"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
    <div class="modal-content">

        <h3 id="modalTitle">Nuevo Artículo</h3>

        <label>Código:</label>
        <input type="text" id="cod">

        <label>Nombre del Artículo:</label>
        <input type="text" id="nom">

        <label>Precio:</label>
        <input type="number" step="0.01" id="pre">

        <label>Stock:</label>
        <input type="number" id="sto">

        <div class="modal-buttons">
            <button class="btn-primary" onclick="guardarArticulo()">Guardar</button>
            <button class="btn-sec" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>
</div>

<!-- Modal Exclusiva para Ajuste de Inventario -->
<div id="modal-stock-adjust" class="modal hidden">
   <div class="modal-content" style="max-width: 450px;">
      <h3 id="stock-modal-title">Movimiento de Inventario</h3>
      <p id="stock-modal-sku" style="font-weight: bold; color: #555;"></p>
      

<div class="form-row" style="display: flex; gap: 10px; margin-bottom: 15px;">
    <div style="flex: 1;">
        <label>Stock Actual</label>
        <!-- Forzamos el ID st-current, valor inicial en 0 y modo lectura -->
        <input id="st-current" type="number" readonly value="0" style="background: #eee; width: 100%; color: #333; font-weight: bold;">
    </div>
    <div style="flex: 1;">
        <label>Cantidad a Mover *</label>
        <input id="st-qty" type="number" min="1" placeholder="Ej: 5, 10" style="width: 100%;">
    </div>
</div>


      <div class="form-row" style="margin-bottom: 15px;">
          <label>Tipo de Operación *</label>
          <select id="st-type" style="width: 100%;">
              <option value="entrada_surtido">📈 Entrada - Surtido de Mercancía</option>
              <option value="entrada_traspaso">🔄 Entrada - Traspaso de Tienda</option>
              <option value="salida_traspaso">🔄 Salida - Traspaso de Tienda</option>
              <option value="ajuste_auditoria">🔧 Ajuste - Conteo / Auditoría</option>
              <option value="salida_merma">📉 Salida - Artículo Dañado / Merma</option>
          </select>
      </div>

      <div class="form-row" style="margin-bottom: 15px;">
          <label>Motivo / Comentarios Breves *</label>
          <input id="st-reason" placeholder="Ej: Recibido de sucursal centro..." style="width: 100%;">
      </div>

      <div class="form-row" style="display: flex; justify-content: flex-end; gap: 10px;">
          <button class="btn" onclick="guardarAjusteInventario()">Aplicar Movimiento</button>
          <button class="btn alt" onclick="cerrarModalStock()">Cancelar</button>
      </div>
   </div>
</div>

<script  src="auth.js"></script>
<script>requireRole('admin');</script>
<script src="db.js"></script>
<script src="catalog.js"></script>

</body>
</html>
