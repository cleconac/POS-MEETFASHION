<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"><title>Usuarios - POS</title>
<link rel="stylesheet" href="styles.css">
<style>
.container-small{ max-width:100%; margin:28px auto; padding:18px; background:#fff; border-radius:10px; box-shadow:0 4px 18px rgba(0,0,0,0.06); }
.form-row{ display:flex; gap:10px; flex-wrap:wrap; }
.form-row input, .form-row select{ padding:10px; border-radius:6px; border:1px solid #ddd; flex:1; }
.user-list{ margin-top:20px; }
.user-row{ display:flex; justify-content:space-between; padding:10px 12px; border-bottom:1px solid #f0f0f0; align-items:center; }
.small-btn{ padding:6px 8px; font-size:13px; }
</style>
<script>
function  initAutocomplete()  {
   const  input  = document.getElementById('u-address');
    const autocomplete  =  new  google.maps.places.Autocomplete(input, {
       types:  ['geocode'],
       componentRestrictions: {  country:  'mx'  }
   });
   autocomplete.addListener('place_changed',  ()  => {
       const  place  = autocomplete.getPlace();
       if  (place.formatted_address)  {
          input.value  = place.formatted_address;
       }
   });
}

// Obtener de forma segura los datos del administrador que inició sesión en esta terminal
const activeUserSession = JSON.parse(sessionStorage.getItem('pos_user')) || null;

</script>

</head>
<body>

<header class="topbar">
    <div class="title">Gestión de Usuarios</div>
    <div  class="topbar-left">
       <button class="btn-sec" onclick="location.href='ventas.html'">← Volver al POS</button>
       <button  class="btn small" onclick="abrirModalNuevo()">+ Agregar  usuario</button>
   </div>
</header>
<div class="container container-small">

<div class="user-header">
    <h2>Usuarios</h2>
</div>

<table  class="user-table">
   <thead>
       <tr>
	   <th>Usuario</th>
	   <th>Nombre</th>
	   <th>Rol</th>
	   <th>Turno</th>
	   <th>Estación</th>
	   <th>Correo</th>
	   <th>Modificado</th>
	   <th>Acciones</th>
       </tr>
   </thead>
   <tbody  id="user-list"></tbody>
</table>
</div>

<!-- Modal de edición -->
<div  id="modal-user"  class="modal  hidden">
   <div  class="modal-content">
      <h3  id="modal-title">Nuevo  usuario</h3>
      
       <div class="form-row">
           <div>
               <label style="display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #333;">Alias</label>
               <input id="u-user" placeholder="Usuario (login)">
           </div>
           <div>
               <label style="display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #333;">Nombre</label>
               <input id="u-name" placeholder="Nombre completo">
           </div>
           
           <!-- CORRECCIÓN CRÍTICA: Estructura limpia para el campo Contraseña -->
           <div style="flex: 1; display: flex; flex-direction: column;">
               <label style="display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #333;">Contraseña</label>
               
               <!-- El password-wrapper ahora solo envuelve al input y al ojo, alineándolos perfectamente -->
               <div class="password-wrapper" style="position: relative; display: flex; align-items: center; width: 100%;">
                   <input id="u-pass" placeholder="Contraseña" type="password" style="padding-right: 40px; width: 100%;">
                   <button type="button" id="toggle-u-pass" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 16px; padding: 0; color: #6c757d; z-index: 10;">
                       👁️
                   </button>
               </div>
           </div>
       </div>

       
      <div  class="form-row">
	<div>
          <label style="display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #333;">Teléfono</label>
          <input  id="u-phone"  placeholder="Teléfono"  maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
	</div>
	<div>
          <label style="display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #333;">Correo</label>
          <input  id="u-mail"  placeholder="Email">
	</div>
      </div> <!-- ✅ CORREGIDO: Cierre correcto de la fila de teléfono y correo -->

	  <!-- SECCIÓN DE DIRECCIÓN INDEPENDIENTE Y FLOTANTE -->
	  <div class="form-row" style="position: relative; width: 100%; display: block; margin-bottom: 15px;">
	      <label style="display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #333;">Dirección</label>
	      <input id="u-address" placeholder="Escribe calle, número, colonia..." class="form-control" autocomplete="off" style="width: 100%;">
	    
	      <!-- Contenedor flotante para las sugerencias de OpenStreetMap -->
	      <div id="autocomplete-results" style="position: absolute; left: 0; right: 0; background: #fff; border: 1px solid #ccc; border-top: none; z-index: 9999; max-height: 200px; overflow-y: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 0 0 4px 4px;" class="hidden">
	          <!-- Se llenará dinámicamente con JS -->
	      </div>
	  </div> <!-- ✅ CORREGIDO: Cierre correcto de la sección de dirección -->

       <div  class="form-row">
	<div>
          <label style="display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #333;">Rol de usuario</label>
          <select  id="u-role"><option value="vendedor">👩‍💼 Vendedor</option><option  value="admin">🔑 Administrador</option><option value="master">👑 Master</option></select>
	</div>
	<div>
          <label style="display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #333;">Turno</label>
          <select  id="u-shift"><option  value="matutino">Matutino</option><option  value="vespertino">Vespertino</option></select>
	</div>
	<div>
          <label style="display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #333;">Estación</label>
          <select  id="u-station"></select>
	</div>
      </div>
      
       <div  class="form-row">
          <button  class="btn"  onclick="saveUser()">Guardar</button>
          <button  class="btn alt"  onclick="cerrarModal()">Cancelar</button>
       </div>
   </div>
</div>

                  <input type="checkbox" id="p-user-ver"> 👥 + Usuarios (Habilitar Sección)
              </label>
              <div style="margin-left: 24px; margin-top: 8px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; font-size: 13px;">
                  <label><input type="checkbox" id="p-user-edit"> Editar (Botón)</label>
                  <label><input type="checkbox" id="p-user-del"> Eliminar (Botón)</label>

          <!-- + ESTACIONES -->

              <label style="font-weight: bold; display: flex; align-items: center; gap: 6px; color: #1e293b; font-size: 14px;">
                  <input type="checkbox" id="p-est-ver"> 🚉 + Estaciones (Habilitar Sección)

          <!-- Botones de Acción de la Modal -->
          <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid #f1f3f5; padding-top: 15px;">
              <button type="button" class="btn" onclick="guardarPermisosArbol()" style="background-color: #28a745;">Guardar Permisos</button>

   </div>
</div>

<script>

 window.addEventListener('DOMContentLoaded',  ()  => {
     renderUsers();
});

let editId = null;

function saveUser(){
   const user = document.getElementById('u-user').value.trim();
   const stationIn = document.getElementById("u-station").value; // Leemos la estación seleccionada
   
   if (!user) return alert('Usuario requerido');

   // 1. Construcción del objeto de datos centralizado
   const obj = {
       user,
       name:  document.getElementById('u-name').value.trim(),
       pass:  document.getElementById('u-pass').value,
       phone: document.getElementById('u-phone').value.trim(),
       mail:  document.getElementById('u-mail').value.trim(),
       address: document.getElementById('u-address').value.trim(),
       role:  document.getElementById('u-role').value,
       shift: document.getElementById('u-shift').value,
       modified: new Date().toISOString(),
       estacion: stationIn
   };

    // 2. CORRECCIÓN DEL CANDADO: Validamos leyendo las propiedades de 'obj'
    if (!obj.user || !obj.name || !obj.pass || !obj.phone || !obj.mail || !obj.address || !obj.role || !obj.shift || !obj.estacion) {
        alert("❌ Todos los campos son obligatorios.\nPor favor, ingresa los datos de acceso, información de contacto, dirección y asigna una estación de trabajo.");
        return; // Retorna e interrumpe el guardado
    }

    // 3. CORRECCIÓN DE VALIDACIÓN DE TELÉFONO: Evaluamos el campo correcto de 'obj'
    if (obj.phone.length < 10 || isNaN(obj.phone)) {
        alert("❌ El campo de teléfono debe contener exactamente 10 dígitos numéricos.");
        return;
    }

    // 4. CORRECCIÓN DE USUARIO DUPLICADO (Solo si es un usuario NUEVO)
    let listaUsuarios = DB.getUsers ? DB.getUsers() : (JSON.parse(localStorage.getItem("usuarios")) || []);
    
    // Si la variable global de edición (ej. editId) está vacía, significa que es nuevo
    if (typeof editId === 'undefined' || editId === null) {
        const existeUsuario = listaUsuarios.some(u => (u.user || u.usuario || '').toLowerCase() === obj.user.toLowerCase());
        if (existeUsuario) {
            alert("❌ Este nombre de usuario (login) ya está registrado. Elige otro.");
            return;
        }
    }

   // 5. Guardar y refrescar interfaz
   DB.saveUser(obj);
   renderUsers();
   cerrarModal();
}

function deleteUser(u){
  if(!confirm('Eliminar usuario?')) return;
  DB.deleteUser(u);
  renderUsers();
}

function verifyAddress(encoded){
  if(!encoded) return alert('Sin dirección');
  window.open(`https://www.google.com/maps/search/?api=1&query=${encoded}`,'_blank');
}


renderUsers();


function abrirModalNuevo(){
  editId = null;
  document.getElementById('modal-title').textContent = 'Nuevo usuario';
  document.querySelectorAll('#u-user,#u-name,#u-pass,#u-phone,#u-mail,#u-address').forEach(i => i.value = '');
  document.getElementById('u-role').value = 'vendedor';
  document.getElementById('u-shift').value = 'matutino';
  document.getElementById('u-user').readOnly = false;

  // Llamamos la función sin parámetros para que muestre el mensaje "-- Selecciona Estación --"
  poblarSelectorEstaciones(""); 

  document.getElementById('modal-user').classList.remove('hidden');
}

function editUser(u){
  const obj = DB.getUsers().find(x=>x.user===u);
  if(!obj) return;
  document.getElementById('u-user').value = obj.user;
  document.getElementById('u-name').value = obj.name || '';
  document.getElementById('u-pass').value = obj.pass || '';
  document.getElementById('u-phone').value = obj.phone || '';
  document.getElementById('u-mail').value = obj.mail || '';
  document.getElementById('u-address').value = obj.address || '';
  document.getElementById('u-role').value = obj.role || 'vendedor';
  document.getElementById('u-shift').value = obj.shift || 'matutino';
}

function abrirModalEditar(u){
  const obj = DB.getUsers().find(x => x.user === u);
  if (!obj) return;
  editId = u;
  document.getElementById('modal-title').textContent = 'Editar usuario';
  document.getElementById('u-user').value = obj.user;
  document.getElementById('u-user').readOnly = true;
  document.getElementById('u-name').value = obj.name || '';
  document.getElementById('u-pass').value = obj.pass || '';
  document.getElementById('u-phone').value = obj.phone || '';
  document.getElementById('u-mail').value = obj.mail || '';
  document.getElementById('u-address').value = obj.address || '';
  document.getElementById('u-role').value = obj.role || 'vendedor';
  document.getElementById('u-shift').value = obj.shift || 'matutino';

  const estacionActual = obj.estacion || "";
  poblarSelectorEstaciones(estacionActual);

  document.getElementById('modal-user').classList.remove('hidden');
}

function cerrarModal(){
  document.getElementById('modal-user').classList.add('hidden');
}

document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
        const modal = document.getElementById("modal-user");
        if (modal && !modal.classList.contains("hidden")) {
            // Cerrar modal
            modal.classList.add("hidden");
	}

        const modalPermisos = document.getElementById("modal-user-permissions");
        if (modalPermisos && !modalPermisos.classList.contains("hidden")) {
            // Cerrar modal
            modalPermisos.classList.add("hidden");
	}

    }
});


function renderUsers(){
   const ul = document.getElementById('user-list');
   if (!ul) return; 
   
   const users = DB.getUsers();
   ul.innerHTML = '';
   
   const aliasLogueado = (activeUserSession?.user || activeUserSession?.usuario || '').toLowerCase();
   const rolLogueado = (activeUserSession?.role || activeUserSession?.rol || '').toLowerCase();
   
   // El operador actual es maestro si su alias es raíz o si ostenta el rol MASTER
   const operadorEsElMaestro = aliasLogueado === 'sup' || aliasLogueado === 'admin' || rolLogueado === 'master';
   const esMaestro = operadorEsElMaestro; // Mantenemos consistencia con tus variables internas
   
   const p = esMaestro ? { editar: true, eliminar: true, ver_mapa: true, crear: true } : (activeUserSession?.permisos?.usuarios || {});

   users.forEach(u => {
      const loginUser = u.user || '';
      const rolUser = u.role || 'vendedor';
      
      const loginUserMinusculas = loginUser.toLowerCase();
      const rolUserMinusculas = rolUser.toLowerCase();
      
      // La fila pertenece al maestro si cumple con el alias o si tiene el rol supremo
      const esFilaDelMaestro = loginUserMinusculas === 'sup' || loginUserMinusculas === 'admin' || rolUserMinusculas === 'master';

      let botonEditarHtml = '';
      let botonEliminarHtml = '';
      let botonMapaHtml = '';
      let botonPermisosHtml = '';

      // ✏️ EVALUAR BOTÓN EDITAR
      if (esMaestro || p.editar) {
          if (esFilaDelMaestro && !operadorEsElMaestro) {
              // Si Wendy (admin) ve la fila de un MASTER, el botón se bloquea por seguridad
              botonEditarHtml = `<button class="btn small" disabled style="background:#cbd5e1; color:#94a3b8; cursor:not-allowed;" title="No tienes permisos para alterar a un usuario MASTER.">✏️ Editar</button>`;
          } else {
              botonEditarHtml = `<button class="btn small" style="background-color: #0066ff;" onclick="abrirModalEditar('${loginUser}')">✏️ Editar</button>`;
          }
      }

      // 🗑️ EVALUAR BOTÓN ELIMINAR
      if (esMaestro || p.eliminar) {
          if (esFilaDelMaestro) {
              // Los perfiles MASTER son imborrables para mantener la estabilidad del POS
              botonEliminarHtml = `<button class="btn small" disabled style="background:#cbd5e1; color:#94a3b8; cursor:not-allowed;" title="Los usuarios MASTER son imborrables para la seguridad del POS.">🗑️ Eliminar</button>`;
          } else {
              botonEliminarHtml = `<button class="btn small btn-eliminar-user" style="background-color: #dc3545;" onclick="deleteUser('${loginUser}')">🗑️ Eliminar</button>`;
          }
      }

      // 📍 EVALUAR BOTÓN VER MAPA
      if (esMaestro || p.ver_mapa) {
          botonMapaHtml = `<button class="btn small btn-mapa-user" style="background-color: #17a2b8;" onclick="verifyAddress('${encodeURIComponent(u.address || '')}')">📍 Ver mapa</button>`;
      }

      // 🔑 EVALUAR BOTÓN PERMISOS
      if (rolUserMinusculas === 'admin' || rolUserMinusculas === 'master') {
          if (esFilaDelMaestro) {
              // Si es un MASTER, muestra la insignia de control supremo indestructible
              botonPermisosHtml = `<button class="btn small" disabled style="background:#059669; color:white; cursor:not-allowed;" title="Acceso Absoluto del Sistema">👑 Master</button>`;
          } else if (esMaestro || p.crear || p.editar) { 
              botonPermisosHtml = `<button class="btn small" onclick="abrirModalPermisos('${loginUser}')" style="background-color: #6f42c1; color: white;">🔑 Permisos</button>`;
          }
      }

      // INYECCIÓN VISUAL CON LOS CANDADOS Y TEXTOS DE ROLES UNIFICADOS
      const tr = document.createElement('tr');
      tr.innerHTML = `
         <td><strong>${loginUser}</strong></td>
          <td>${u.name || ''}</td>
          <td><span style="${esFilaDelMaestro ? 'color: #059669; font-weight: bold;' : ''}">${rolUser.toUpperCase()}</span></td>
          <td>${u.shift || ''}</td>
          <td>${esFilaDelMaestro ? '<span style="color: #64748b; font-weight: 500;">🌐 Acceso Global</span>' : (u.estacion || '—')}</td>
          <td>${u.mail || ''}</td>
          <td>${u.modified ? new Date(u.modified).toLocaleString() : '-'}</td>
          <td>
             ${botonEditarHtml}
             ${botonEliminarHtml}
             ${botonMapaHtml}
             ${botonPermisosHtml}
         </td>`;
       ul.appendChild(tr);
   });
}




// FUNCIÓN PARA CONTROLAR ACCIONES DE CABECERA EN LA SECCIÓN DE USUARIOS
function validarCandadosCabeceraUsuarios() {
    if (!activeUserSession) return;

    const aliasLogueado = (activeUserSession.user || activeUserSession.usuario || '').toLowerCase();
    const esMaestro = aliasLogueado === 'sup' || aliasLogueado === 'admin';
    
    // Leemos la casilla específica de "Agregar usuario" (crear)
    const puedeCrear = esMaestro || (activeUserSession.permisos?.usuarios?.crear || false);

    // Buscamos tu botón azul superior de la captura
    // Nota: Revisa que tu botón HTML tenga el ID "btn-add-user-top" o usa el querySelector
    const btnAgregarUsuario = document.getElementById('btn-add-user-top') || document.querySelector('button[onclick*="abrirModalNuevo"]');
    
    if (btnAgregarUsuario) {
        // Si no tiene el permiso, lo ocultamos por completo del panel superior
        btnAgregarUsuario.style.display = puedeCrear ? '' : 'none';
    }
}

// Forzamos la ejecución de las validaciones en cuanto la página de usuarios abre
document.addEventListener("DOMContentLoaded", () => {
    validarCandadosCabeceraUsuarios();
    if (typeof renderUsers === "function") renderUsers();
});



// Control de visibilidad de la contraseña en la modal de usuarios
document.addEventListener('click', function(event) {
    if (event.target && event.target.id === 'toggle-u-pass') {
        const passwordInput = document.getElementById('u-pass');
        const button = event.target;
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            button.textContent = '🙈'; // Cambia el icono cuando es visible
        } else {
            passwordInput.type = 'password';
            button.textContent = '👁️'; // Regresa al icono original
        }
    }
});


function poblarSelectorEstaciones(estacionSeleccionada = "") {
    const selectStation = document.getElementById("u-station");
    if (!selectStation) return;

    // 1. Leer las estaciones reales de tu catálogo centralizado
    const estaciones = DB.getStations();

    // 2. Limpiar opciones anteriores del HTML
    selectStation.innerHTML = "";

    // 3. Añadir una opción por defecto/inicial por si el usuario no tiene estación asignada aún
    const optDefault = document.createElement("option");
    optDefault.value = "";
    optDefault.textContent = "-- Selecciona Estación (Opcional) --";
    selectStation.appendChild(optDefault);

    // 4. Inyectar las estaciones reales del LocalStorage
    estaciones.forEach(est => {
        const option = document.createElement("option");
        option.value = est.nombre; // Guardamos el nombre como identificador
        option.textContent = est.nombre; // Texto visible en el menú
        
        // Si estamos editando y coincide con la estación actual del usuario, la dejamos marcada
        if (est.nombre === estacionSeleccionada) {
            option.selected = true;
        }
        
        selectStation.appendChild(option);
    });
}


// ========================================================
// AUTOCOMPLETADO DE DIRECCIONES GRATUITO CON OPENSTREETMAP
// ========================================================
let debounceTimer;

document.getElementById('u-address')?.addEventListener('input', function() {
    const query = this.value.trim();
    const resultsContainer = document.getElementById('autocomplete-results');
    
    if (!resultsContainer) return;
    
    // Si borra el texto, ocultamos la caja de sugerencias
    if (query.length < 3) {
        resultsContainer.innerHTML = '';
        resultsContainer.classList.add('hidden');
        return;
    }

    // Cancelamos el temporizador anterior si sigue escribiendo rápido
    clearTimeout(debounceTimer);

    // Esperamos 400ms tras la última pulsación de tecla para no saturar la red
    debounceTimer = setTimeout(() => {
        // Consultamos la API pública y gratuita de 

        // Agregamos 'countrycodes=mx' para restringir la búsqueda a México y sea más rápido
        fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=5&countrycodes=mx&q=${encodeURIComponent(query)}`, {
            headers: {
                'User-Agent': 'MeetFashion-POS-Local-v1.0'
            }
        })
        .then(response => response.json())

            .then(data => {
                resultsContainer.innerHTML = '';
                
                if (data.length === 0) {
                    resultsContainer.classList.add('hidden');
                    return;
                }

                resultsContainer.classList.remove('hidden');

                // Renderizar cada opción devuelta por OpenStreetMap
                data.forEach(place => {
                    const item = document.createElement('div');
                    item.style.padding = '10px';
                    item.style.cursor = 'pointer';
                    item.style.borderBottom = '1px solid #f0f0f0';
                    item.style.fontSize = '13px';
                    item.style.color = '#333';
                    item.textContent = place.display_name;

                    // Efecto visual al pasar el mouse por encima
                    item.onmouseover = () => item.style.background = '#f8f9fa';
                    item.onmouseout = () => item.style.background = '#fff';

                    // Acción al seleccionar la dirección de la lista
                    item.addEventListener('click', () => {
                        document.getElementById('u-address').value = place.display_name;
                        resultsContainer.innerHTML = '';
                        resultsContainer.classList.add('hidden');
                    });

                    resultsContainer.appendChild(item);
                });
            })
            .catch(err => console.error("Error en autocompletado:", err));
    }, 400);
});

// Cerrar el menú flotante si el usuario hace clic en cualquier otra parte de la pantalla
document.addEventListener('click', (e) => {
    const container = document.getElementById('autocomplete-results');
    if (container && e.target.id !== 'u-address') {
        container.classList.add('hidden');
    }
});

// ========================================================
// CONTROL DINÁMICO DE CASILLAS PADRE e HIJOS EN EL ÁRBOL
// ========================================================

// Función para habilitar/deshabilitar los hijos según el estado del padre
function actualizarEstadoHijos(idPadre, listaIdsHijos) {
    const chkPadre = document.getElementById(idPadre);
    if (!chkPadre) return;

    listaIdsHijos.forEach(idHijo => {
        const chkHijo = document.getElementById(idHijo);
        if (chkHijo) {
            // 🔥 CLAVE: Si el padre NO está checado, el hijo se bloquea (disabled = true)
            chkHijo.disabled = !chkPadre.checked;
            
            // UX EXTRA: Si el padre se desmarca, desmarcamos automáticamente al hijo
            if (!chkPadre.checked) {
                chkHijo.checked = false;
            }
        }
    });
}

// Función maestra que se ejecuta al abrir la modal y cada vez que cambia un padre
function sincronizarTodosLosPermisos() {
    // 1. Mapeo del módulo Catálogo
    actualizarEstadoHijos('p-cat-ver', [
        'p-cat-edit', 'p-cat-del', 'p-cat-stock', 'p-cat-hist', 
        'p-cat-new', 'p-cat-imp', 'p-cat-exp', 'p-cat-exphist'
    ]);

    // 2. Mapeo del módulo Reportes (El de tu ejemplo visual)
    actualizarEstadoHijos('p-rep-ver', [
        'p-rep-ventas', 'p-rep-cortes', 'p-rep-exp'
    ]);

    // 3. Mapeo del módulo Usuarios
    actualizarEstadoHijos('p-user-ver', [
        'p-user-edit', 'p-user-del', 'p-user-map', 'p-user-add'
    ]);

    // 4. Mapeo del módulo Estaciones
    actualizarEstadoHijos('p-est-ver', [
        'p-est-edit', 'p-est-del', 'p-est-add'
    ]);
}

// VINCULAR LOS ESCUCHADORES EN EL FORMULARIO
function inicializarEscuchadoresArbolPermisos() {
    // Escuchamos el clic de cada checkbox padre de la modal
    document.getElementById('p-cat-ver')?.addEventListener('change', sincronizarTodosLosPermisos);
    document.getElementById('p-rep-ver')?.addEventListener('change', deleteEvent = sincronizarTodosLosPermisos);
    document.getElementById('p-user-ver')?.addEventListener('change', sincronizarTodosLosPermisos);
    document.getElementById('p-est-ver')?.addEventListener('change', sincronizarTodosLosPermisos);
}

// Variable global para recordar a qué administrador le estamos editando el árbol
let currentPermissionsTargetUser = null;

function abrirModalPermisos(loginUser) {
    const lista = DB.getUsers ? DB.getUsers() : (JSON.parse(localStorage.getItem('usuarios')) || []);
    const usuario = lista.find(x => (x.user || x.usuario) === loginUser);
    if (!usuario) return alert("Usuario no localizado.");

    currentPermissionsTargetUser = loginUser;
    document.getElementById('perm-modal-user-title').textContent = `Configurando accesos para el alias: @${loginUser} (${usuario.nombre || 'Administrador Seccional'})`;

    // Si el usuario no tiene mapa de permisos guardado previamente, le creamos uno vacío por defecto
    const p = usuario.permisos || { catalogo: {}, reportes: {}, usuarios: {}, estaciones: {} };

    // CARGAR VALORES EN LOS CHECKBOXES DESDE LA BASE DE DATOS LOCAL
    document.getElementById('p-cat-ver').checked = p.catalogo?.ver || false;
    document.getElementById('p-cat-edit').checked = p.catalogo?.editar || false;
    document.getElementById('p-cat-del').checked = p.catalogo?.eliminar || false;
    document.getElementById('p-cat-stock').checked = p.catalogo?.stock || false;
    document.getElementById('p-cat-hist').checked = p.catalogo?.historial || false;
    document.getElementById('p-cat-new').checked = p.catalogo?.nuevo || false;
    document.getElementById('p-cat-imp').checked = p.catalogo?.importar || false;
    document.getElementById('p-cat-exp').checked = p.catalogo?.exportar_cat || false;
    document.getElementById('p-cat-exphist').checked = p.catalogo?.exportar_stock || false;

    document.getElementById('p-rep-ver').checked = p.reportes?.ver || false;
    document.getElementById('p-rep-ventas').checked = p.reportes?.ventas || false;
    document.getElementById('p-rep-cortes').checked = p.reportes?.cortes || false;
    document.getElementById('p-rep-exp').checked = p.reportes?.exportar || false;

    document.getElementById('p-user-ver').checked = p.usuarios?.ver || false;
    document.getElementById('p-user-edit').checked = p.usuarios?.editar || false;
    document.getElementById('p-user-del').checked = p.usuarios?.eliminar || false;
    document.getElementById('p-user-map').checked = p.usuarios?.ver_mapa || false;
    document.getElementById('p-user-add').checked = p.usuarios?.crear || false;

    document.getElementById('p-est-ver').checked = p.estaciones?.ver || false;
    document.getElementById('p-est-edit').checked = p.estaciones?.editar || false;
    document.getElementById('p-est-del').checked = p.estaciones?.eliminar || false;
    document.getElementById('p-est-add').checked = p.estaciones?.crear || false;

    sincronizarTodosLosPermisos();
    inicializarEscuchadoresArbolPermisos();

    document.getElementById('modal-user-permissions').classList.remove('hidden');
}

function guardarPermisosArbol() {
    let lista = DB.getUsers ? DB.getUsers() : (JSON.parse(localStorage.getItem('usuarios')) || []);
    
    // 1. Recopilar el mapa completo del árbol (Tu bloque actual se queda igual)
    const mapaPermisos = {
        catalogo: {
            ver: document.getElementById('p-cat-ver').checked,
            editar: document.getElementById('p-cat-edit').checked,
            eliminar: document.getElementById('p-cat-del').checked,
            stock: document.getElementById('p-cat-stock').checked,
            historial: document.getElementById('p-cat-hist').checked,
            nuevo: document.getElementById('p-cat-new').checked,
            importar: document.getElementById('p-cat-imp').checked,
            exportar_cat: document.getElementById('p-cat-exp').checked,
            exportar_stock: document.getElementById('p-cat-exphist').checked
        },
        reportes: {
            ver: document.getElementById('p-rep-ver').checked,
            ventas: document.getElementById('p-rep-ventas').checked,
            cortes: document.getElementById('p-rep-cortes').checked,
            exportar: document.getElementById('p-rep-exp').checked
        },
        usuarios: {
            ver: document.getElementById('p-user-ver').checked,
            editar: document.getElementById('p-user-edit').checked,
            eliminar: document.getElementById('p-user-del').checked,
            ver_mapa: document.getElementById('p-user-map').checked,
            crear: document.getElementById('p-user-add').checked
        },
        estaciones: {
            ver: document.getElementById('p-est-ver').checked,
            editar: document.getElementById('p-est-edit').checked,
            eliminar: document.getElementById('p-est-del').checked,
            crear: document.getElementById('p-est-add').checked
        }
    };

    // 2. Buscar al usuario modificado y actualizar su objeto en el arreglo maestro
    lista = lista.map(u => {
        if ((u.user || u.usuario) === currentPermissionsTargetUser) {
            return { ...u, permisos: mapaPermisos };
        }
        return u;
    });

    // Guardar en la base de datos persistente (LocalStorage)
    if (DB.saveUsers) {
        DB.saveUsers(lista);
    } else {
        localStorage.setItem('usuarios', JSON.stringify(lista));
    }

    // ========================================================
    // 🔥 CORRECCIÓN CRÍTICA: REFRESCO EN TIEMPO REAL SIN F5
    // ========================================================
    
    // A. Si el administrador editado es el mismo que está operando en la terminal (ej: Wendy se auto-edita)
    const usuarioActivoSesion = JSON.parse(sessionStorage.getItem('pos_user'));
    if (usuarioActivoSesion && (usuarioActivoSesion.user || usuarioActivoSesion.usuario) === currentPermissionsTargetUser) {
        usuarioActivoSesion.permisos = mapaPermisos;
        
        // Sincronizamos la base de datos de la sesión del navegador
        sessionStorage.setItem('pos_user', JSON.stringify(usuarioActivoSesion));
        
        // Sincronizamos la variable global que lee renderUsers() de forma obligatoria
        if (typeof activeUserSession !== 'undefined') {
            activeUserSession.permisos = mapaPermisos;
        }
    }

    alert("¡Árbol de permisos guardado y actualizado con éxito!");
    
    // 3. Cerrar la ventana y volver a pintar las cabeceras y filas con los nuevos candados al instante
    cerrarModalPermisos();
    
    if (typeof validarCandadosCabeceraUsuarios === "function") {
        validarCandadosCabeceraUsuarios(); // Evalúa de nuevo el botón azul superior "+ Agregar"
    }
    
    if (typeof renderUsers === "function") {
        renderUsers(); // Redibuja las filas de la tabla ocultando/mostrando Editar, Eliminar o Ver Mapa
    }
}


function cerrarModalPermisos() {
    document.getElementById('modal-user-permissions').classList.add('hidden');
    currentPermissionsTargetUser = null;
}
