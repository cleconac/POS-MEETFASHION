<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ticket</title>
    <link rel="stylesheet" href="ticket.css">
</head>
<body>

<div id="ticket">
    <h2 class="title">MEET FASHION</h2>
    <p class="sub">Comprobante de venta</p>
    <p id="t-date"></p>
    <p id="t-id"></p>

    <div id="t-items"></div>

    <p class="line"></p>

    <p class="tot">
        TOTAL: <span id="t-total"></span>
    </p>

    <p>Pago en efectivo: <span id="t-cash"></span></p>
    <p>Pago con tarjeta: <span id="t-card"></span></p>
    <p>Pago transferencia: <span id="t-trans"></span></p>
    <p>Cambio: <span id="t-change"></span></p>

    <p class="line"></p>

    <p class="footer">Gracias por su compra</p>
</div>

<script src="ticket.js"></script>
</body>
</html>
